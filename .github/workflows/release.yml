name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  flatpak:
    name: Flatpak Bundle
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download meson subprojects
        run: meson subprojects download

      - name: Build flatpak bundle
        run: bash scripts/release-flatpak.sh

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: dist/flatpak/*.flatpak

  appimage:
    name: AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            gettext \
            glib2.0-bin \
            libadwaita-1-dev \
            libgee-0.8-dev \
            libgtk-4-dev \
            libgudev-1.0-dev \
            libhamlib-dev \
            libjson-glib-dev \
            libsoup-3.0-dev \
            libshumate-dev \
            libsqlite3-dev \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            python3-pip \
            valac

      - name: Install appimage-builder
        run: |
          python3 -m pip install --user appimage-builder==1.1.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download meson subprojects
        run: meson subprojects download

      - name: Build AppImage
        run: bash scripts/release-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dist/appimage/*.AppImage
