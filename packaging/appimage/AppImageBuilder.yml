version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: com.k0vcz.Artemis
    name: Artemis
    icon: com.k0vcz.Artemis
    version: 1.0.0
    exec: usr/bin/com.k0vcz.Artemis
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ noble-updates main restricted universe multiverse
    include:
      - libadwaita-1-0
      - libdex-1-1
      - libgee-0.8-2
      - libgtk-4-1
      - libgudev-1.0-0
      - libhamlib4
      - libjson-glib-1.0-0
      - libsoup-3.0-0
      - libshumate-1.0-1
      - libsqlite3-0
      - libwebkitgtk-6.0-4
    exclude:
      - libc6
      - libgcc-s1
      - libstdc++6

AppImage:
  arch: x86_64
  file_name: Artemis-x86_64.AppImage

  runtime:
    env:
      GSETTINGS_SCHEMA_DIR: $APPDIR/usr/share/glib-2.0/schemas
