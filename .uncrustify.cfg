# Uncrustify configuration for Vala projects
# Based on GNOME Vala coding style

# General options
newlines                     = auto
input_tab_size               = 4
output_tab_size              = 4
string_escape_char           = 92
string_escape_char2          = 0
code_width                   = 80

# Indentation
indent_with_tabs             = 0
indent_columns               = 4
indent_label                 = 1
indent_align_assign          = false
indent_switch_case           = 4
indent_class                 = true
indent_access_spec           = 1
indent_func_def_param        = true
indent_func_call_param       = true
indent_func_proto_param      = true

# Spacing
sp_before_sparen             = force
sp_inside_sparen             = remove
sp_after_sparen              = force
sp_sparen_brace              = force
sp_before_square             = remove
sp_before_squares            = remove
sp_inside_square             = remove
sp_after_comma               = force
sp_before_comma              = remove
sp_after_class_colon         = force
sp_before_class_colon        = force
sp_assign                    = force
sp_arith                     = force
sp_bool                      = force
sp_compare                   = force
sp_after_cast                = remove
sp_inside_paren_cast         = remove
sp_sizeof_paren              = remove
sp_after_tag                 = force
sp_inside_braces_enum        = force
sp_inside_braces_struct      = force
sp_inside_braces             = force
sp_inside_braces_empty       = remove
sp_type_func                 = force
sp_func_proto_paren          = remove
sp_func_def_paren            = remove
sp_func_call_paren           = remove
sp_return_paren              = remove
sp_attribute_paren           = remove
sp_defined_paren             = remove
sp_throw_paren               = remove
sp_after_throw               = force
sp_catch_paren               = remove
sp_version_paren             = remove
sp_scope_paren               = remove
sp_super_paren               = remove
sp_this_paren                = remove
sp_macro_func                = force
sp_else_brace                = force
sp_brace_else                = force
sp_brace_typedef             = force
sp_catch_brace               = force
sp_brace_catch               = force
sp_finally_brace             = force
sp_brace_finally             = force
sp_try_brace                 = force
sp_getset_brace              = force

# Line splitting
ls_for_split_full            = true
ls_func_split_full           = true
ls_code_width                = true

# Code alignment
align_with_tabs              = false
align_on_tabstop             = false
align_func_params            = false
align_same_func_call_params  = false
align_var_def_colon          = true
align_var_def_attribute      = true
align_var_def_inline         = true
align_right_cmt_mix          = false
align_on_operator            = false
align_mix_var_proto          = false
align_single_line_func       = false
align_single_line_brace      = false
align_nl_cont               = 1
align_left_shift             = false
align_oc_decl_colon          = false

# Newlines
nl_enum_brace                = force
nl_union_brace               = force
nl_struct_brace              = force
nl_do_brace                  = force
nl_if_brace                  = force
nl_for_brace                 = force
nl_else_brace                = force
nl_while_brace               = force
nl_switch_brace              = force
nl_brace_while               = force
nl_brace_else                = force
nl_var_def_blk_end_func_top  = 1
nl_fcall_brace               = force
nl_fdef_brace                = force
nl_after_func_proto          = 0
nl_after_func_proto_group    = 2
nl_after_func_body           = 2
nl_after_func_body_class     = 2
nl_after_func_body_one_liner = 0
nl_before_block_comment      = 2
nl_before_c_comment          = 0
nl_before_cpp_comment        = 0
nl_after_multiline_comment   = 0
nl_before_access_spec        = 1
nl_after_access_spec         = 1
nl_comment_func_def          = 1
nl_after_try_catch_finally   = 1
nl_around_cs_property        = 1
nl_between_get_set           = 1
nl_property_brace            = force
nl_inside_namespace          = 0
nl_after_namespace           = 0
nl_before_namespace          = 0
nl_after_class               = 1
nl_before_class              = 1
nl_after_access_spec         = 1
nl_before_access_spec        = 1
nl_after_semicolon           = true
nl_define_macro              = false
nl_squeeze_ifdef             = false
nl_ds_struct_enum_cmt        = true
nl_ds_struct_enum_close_brace = true
nl_create_if_one_liner       = false
nl_create_for_one_liner      = false
nl_create_while_one_liner    = false

# Blank lines
eat_blanks_after_open_brace  = true
eat_blanks_before_close_brace = true
nl_start_of_file             = remove
nl_end_of_file               = force
nl_end_of_file_min           = 1
nl_max                       = 2
nl_after_func_body           = 2
nl_after_func_proto_group    = 2
nl_class_leave_one_liners    = true

# Code modifications
mod_full_brace_do            = force
mod_full_brace_for           = force
mod_full_brace_function      = force
mod_full_brace_if            = force
mod_full_brace_if_chain      = 1
mod_full_brace_nl            = 3
mod_full_brace_while         = force
mod_paren_on_return          = remove
mod_full_paren_if_bool       = true
mod_remove_extra_semicolon   = true
mod_add_long_function_closebrace_comment = 32
mod_add_long_namespace_closebrace_comment = 16
mod_add_long_class_closebrace_comment = 16
mod_add_long_switch_closebrace_comment = 16
mod_add_long_ifdef_endif_comment = 10
mod_add_long_ifdef_else_comment = 10
mod_sort_import              = false
mod_sort_using               = false
mod_sort_include             = false
mod_move_case_break          = true
mod_case_brace               = remove
mod_remove_duplicate_include = false

# Comment modifications
cmt_width                    = 0
cmt_reflow_mode              = 1
cmt_convert_tab_to_spaces    = false
cmt_indent_multi             = true
cmt_c_group                  = false
cmt_c_nl_start               = false
cmt_c_nl_end                 = false
cmt_cpp_group                = false
cmt_cpp_nl_start             = false
cmt_cpp_nl_end               = false
cmt_cpp_to_c                 = false
cmt_star_cont                = true
cmt_multi_check_last         = true
cmt_insert_file_header       = ""
cmt_insert_file_footer       = ""
cmt_insert_func_header       = ""
cmt_insert_class_header      = ""
cmt_insert_oc_msg_header     = ""

# Preprocessor
pp_indent                    = remove
pp_indent_at_level           = false
pp_indent_count              = 1
pp_space_after               = remove
pp_space_count               = 0
pp_indent_region             = 0
pp_region_indent_code        = false
pp_indent_if                 = 0
pp_if_indent_code            = false
pp_define_at_level           = false

# Vala specific settings
sp_after_new                 = force
sp_before_byref              = remove
sp_after_byref               = force
sp_before_unnamed_byref      = remove